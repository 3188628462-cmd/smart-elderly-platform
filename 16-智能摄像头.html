<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能摄像头 - 智能养老服务平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1abc9c 0%, #16a085 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .header-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .header h1 {
            color: #2d3748;
            margin-bottom: 15px;
            font-size: 2.5rem;
        }

        .header p {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .header-subtitle {
            color: #1abc9c;
            font-weight: bold;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .card h2 {
            color: #2d3748;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.8rem;
        }

        .card-icon {
            font-size: 2rem;
        }

        /* 摄像头状态总览 */
        .camera-overview {
            background: linear-gradient(135deg, #1abc9c 0%, #16a085 100%);
            color: white;
            text-align: center;
            padding: 40px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .camera-status-icon {
            font-size: 6rem;
            margin-bottom: 20px;
            display: block;
        }

        .camera-status {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .camera-desc {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .camera-time {
            margin-top: 15px;
            font-size: 1rem;
            opacity: 0.8;
        }

        /* 实时监控 */
        .live-monitor {
            grid-column: 1 / -1;
            text-align: center;
        }

        .video-container {
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-placeholder {
            color: white;
            text-align: center;
            font-size: 1.2rem;
        }

        .video-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
            animation: pulse 2s infinite;
        }

        .video-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .control-btn.record {
            background: #e74c3c;
            color: white;
        }

        .control-btn.record.active {
            background: #c0392b;
            animation: blink 1s infinite;
        }

        .control-btn.snapshot {
            background: #3498db;
            color: white;
        }

        .control-btn.snapshot:hover {
            background: #2980b9;
        }

        .control-btn.fullscreen {
            background: #1abc9c;
            color: white;
        }

        .control-btn.fullscreen:hover {
            background: #16a085;
        }

        .control-btn.settings {
            background: #f39c12;
            color: white;
        }

        .control-btn.settings:hover {
            background: #e67e22;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.5; }
        }

        /* 智能检测 */
        .smart-detection {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .detection-item {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 2px solid #ecf0f1;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .detection-item:hover {
            border-color: #1abc9c;
            background: rgba(26, 188, 156, 0.05);
            transform: translateY(-3px);
        }

        .detection-item.active {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.05);
        }

        .detection-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }

        .detection-title {
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 8px;
        }

        .detection-status {
            font-size: 0.9rem;
            font-weight: bold;
        }

        .detection-status.normal {
            color: #27ae60;
        }

        .detection-status.alert {
            color: #e74c3c;
        }

        /* 录像回放 */
        .video-playback {
            max-height: 500px;
            overflow-y: auto;
        }

        .playback-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid #ecf0f1;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .playback-item:hover {
            background: rgba(26, 188, 156, 0.05);
        }

        .playback-thumbnail {
            width: 100px;
            height: 60px;
            background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }

        .playback-info {
            flex: 1;
        }

        .playback-title {
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .playback-time {
            color: #666;
            margin-bottom: 3px;
        }

        .playback-duration {
            color: #999;
            font-size: 0.8rem;
        }

        .playback-status {
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .playback-status.available {
            background: rgba(39, 174, 96, 0.1);
            color: #27ae60;
        }

        .playback-status.processing {
            background: rgba(243, 156, 18, 0.1);
            color: #f39c12;
        }

        /* 告警记录 */
        .alert-log {
            max-height: 400px;
            overflow-y: auto;
        }

        .alert-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid #ecf0f1;
            transition: all 0.3s ease;
        }

        .alert-item:hover {
            background: rgba(231, 76, 60, 0.05);
        }

        .alert-item.high-priority {
            border-left: 4px solid #e74c3c;
            background: rgba(231, 76, 60, 0.05);
        }

        .alert-item.medium-priority {
            border-left: 4px solid #f39c12;
        }

        .alert-item.low-priority {
            border-left: 4px solid #3498db;
        }

        .alert-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }

        .alert-info {
            flex: 1;
        }

        .alert-title {
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .alert-description {
            color: #666;
            margin-bottom: 3px;
        }

        .alert-time {
            color: #999;
            font-size: 0.8rem;
        }

        .alert-priority {
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .alert-priority.high {
            background: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
        }

        .alert-priority.medium {
            background: rgba(243, 156, 18, 0.1);
            color: #f39c12;
        }

        .alert-priority.low {
            background: rgba(52, 152, 219, 0.1);
            color: #3498db;
        }

        /* 摄像头设置 */
        .camera-settings {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .setting-item {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #ecf0f1;
            transition: all 0.3s ease;
        }

        .setting-item:hover {
            border-color: #1abc9c;
            background: rgba(26, 188, 156, 0.05);
        }

        .setting-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .setting-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1abc9c 0%, #16a085 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }

        .setting-info {
            flex: 1;
        }

        .setting-title {
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .setting-desc {
            color: #666;
            font-size: 0.9rem;
        }

        .setting-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 25px;
            background: #bdc3c7;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-switch.active {
            background: #1abc9c;
        }

        .toggle-switch::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2.5px;
            left: 2.5px;
            transition: all 0.3s ease;
        }

        .toggle-switch.active::before {
            transform: translateX(25px);
        }

        .slider {
            width: 100%;
            margin: 10px 0;
        }

        .slider input[type="range"] {
            width: 100%;
            height: 5px;
            border-radius: 5px;
            background: #ecf0f1;
            outline: none;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .slider input[type="range"]:hover {
            opacity: 1;
        }

        /* 通知 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transform: translateX(400px);
            transition: all 0.3s ease;
            z-index: 1000;
            max-width: 300px;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            border-left: 4px solid #27ae60;
        }

        .notification.warning {
            border-left: 4px solid #f39c12;
        }

        .notification.error {
            border-left: 4px solid #e74c3c;
        }

        .notification.info {
            border-left: 4px solid #1abc9c;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 8px;
            display: block;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: #1abc9c;
            outline: none;
            box-shadow: 0 0 0 3px rgba(26, 188, 156, 0.1);
        }

        .form-select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
        }

        .modal-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-btn.primary {
            background: #1abc9c;
            color: white;
        }

        .modal-btn.primary:hover {
            background: #16a085;
        }

        .modal-btn.secondary {
            background: #ecf0f1;
            color: #666;
        }

        .modal-btn.secondary:hover {
            background: #d5dbdb;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2rem;
            }

            .card {
                padding: 20px;
            }

            .smart-detection {
                grid-template-columns: repeat(2, 1fr);
            }

            .camera-settings {
                grid-template-columns: 1fr;
            }

            .video-controls {
                flex-direction: column;
                align-items: center;
            }

            .video-container {
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题区域 -->
        <div class="header">
            <div class="header-icon">📹</div>
            <h1>智能摄像头系统</h1>
            <p>实时监控，智能守护</p>
            <div class="header-subtitle">实时监控 • 录像回放 • 智能检测 • 安全告警</div>
        </div>

        <!-- 摄像头状态总览 -->
        <div class="camera-overview">
            <div class="camera-status-icon" id="cameraStatusIcon">📹</div>
            <div class="camera-status" id="cameraStatus">运行正常</div>
            <div class="camera-desc" id="cameraDesc">所有摄像头工作正常，监控范围内无异常</div>
            <div class="camera-time" id="cameraTime">最后更新：2分钟前</div>
        </div>

        <!-- 实时监控 -->
        <div class="card live-monitor">
            <h2><span class="card-icon">📺</span>实时监控</h2>
            <div class="video-container">
                <div class="video-placeholder">
                    <div class="video-icon">📹</div>
                    <div>客厅摄像头 - 实时画面</div>
                    <div style="margin-top: 10px; opacity: 0.7;">1920x1080 | 30fps</div>
                </div>
            </div>
            <div class="video-controls">
                <button class="control-btn record" id="recordBtn" onclick="toggleRecording()">
                    ⏺️ 开始录像
                </button>
                <button class="control-btn snapshot" onclick="takeSnapshot()">
                    📷 截图
                </button>
                <button class="control-btn fullscreen" onclick="fullscreen()">
                    🔍 全屏
                </button>
                <button class="control-btn settings" onclick="showSettingsModal()">
                    ⚙️ 设置
                </button>
            </div>
        </div>

        <!-- 主要内容区域 -->
        <div class="main-grid">
            <!-- 智能检测 -->
            <div class="card">
                <h2><span class="card-icon">🤖</span>智能检测</h2>
                <div class="smart-detection">
                    <div class="detection-item active" id="motionDetection">
                        <span class="detection-icon">🏃</span>
                        <div class="detection-title">运动检测</div>
                        <div class="detection-status normal">正常</div>
                    </div>
                    <div class="detection-item" id="faceDetection">
                        <span class="detection-icon">👤</span>
                        <div class="detection-title">人脸识别</div>
                        <div class="detection-status normal">正常</div>
                    </div>
                    <div class="detection-item" id="soundDetection">
                        <span class="detection-icon">🔊</span>
                        <div class="detection-title">声音检测</div>
                        <div class="detection-status normal">正常</div>
                    </div>
                    <div class="detection-item" id="nightVision">
                        <span class="detection-icon">🌙</span>
                        <div class="detection-title">夜视模式</div>
                        <div class="detection-status normal">自动</div>
                    </div>
                </div>
            </div>

            <!-- 录像回放 -->
            <div class="card">
                <h2><span class="card-icon">🎬</span>录像回放</h2>
                <div class="video-playback" id="videoPlayback">
                    <!-- 录像记录将动态生成 -->
                </div>
            </div>

            <!-- 告警记录 -->
            <div class="card">
                <h2><span class="card-icon">🚨</span>告警记录</h2>
                <div class="alert-log" id="alertLog">
                    <!-- 告警记录将动态生成 -->
                </div>
            </div>

            <!-- 摄像头设置 -->
            <div class="card">
                <h2><span class="card-icon">⚙️</span>摄像头设置</h2>
                <div class="camera-settings">
                    <div class="setting-item">
                        <div class="setting-header">
                            <div class="setting-icon">💡</div>
                            <div class="setting-info">
                                <div class="setting-title">红外夜视</div>
                                <div class="setting-desc">自动切换夜视模式</div>
                            </div>
                        </div>
                        <div class="setting-control">
                            <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
                        </div>
                    </div>
                    <div class="setting-item">
                        <div class="setting-header">
                            <div class="setting-icon">🎯</div>
                            <div class="setting-info">
                                <div class="setting-title">运动追踪</div>
                                <div class="setting-desc">跟踪移动物体</div>
                            </div>
                        </div>
                        <div class="setting-control">
                            <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
                        </div>
                    </div>
                    <div class="setting-item">
                        <div class="setting-header">
                            <div class="setting-icon">🔔</div>
                            <div class="setting-info">
                                <div class="setting-title">声音告警</div>
                                <div class="setting-desc">异常声音提醒</div>
                            </div>
                        </div>
                        <div class="setting-control">
                            <div class="toggle-switch" onclick="toggleSwitch(this)"></div>
                        </div>
                    </div>
                    <div class="setting-item">
                        <div class="setting-header">
                            <div class="setting-icon">📧</div>
                            <div class="setting-info">
                                <div class="setting-title">邮件推送</div>
                                <div class="setting-desc">异常事件邮件通知</div>
                            </div>
                        </div>
                        <div class="setting-control">
                            <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
                        </div>
                    </div>
                </div>
                
                <div style="margin-top: 20px;">
                    <div class="form-group">
                        <label class="form-label">录像质量</label>
                        <div class="slider">
                            <input type="range" min="1" max="5" value="3" id="videoQuality">
                        </div>
                        <div style="text-align: center; color: #666; font-size: 0.9rem;">
                            当前: <span id="qualityValue">3</span>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">录像保存天数</label>
                        <select class="form-select" id="storageDays">
                            <option value="7">7天</option>
                            <option value="14">14天</option>
                            <option value="30" selected>30天</option>
                            <option value="90">90天</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 通知 -->
    <div id="notification" class="notification"></div>

    <script>
        // 模拟数据
        const videoPlayback = [
            { id: 1, title: "运动检测录像", time: "2024-01-16 14:30", duration: "2分30秒", status: "available" },
            { id: 2, title: "访客录像", time: "2024-01-16 12:15", duration: "5分45秒", status: "available" },
            { id: 3, title: "夜间录像", time: "2024-01-16 03:20", duration: "8分15秒", status: "available" },
            { id: 4, title: "异常告警", time: "2024-01-15 20:45", duration: "1分20秒", status: "processing" },
            { id: 5, title: "定时录像", time: "2024-01-15 18:00", duration: "30分00秒", status: "available" }
        ];

        const alertLog = [
            { id: 1, title: "检测到运动", description: "客厅区域检测到异常运动", time: "5分钟前", priority: "medium" },
            { id: 2, title: "访客识别", description: "识别到家庭成员回家", time: "2小时前", priority: "low" },
            { id: 3, title: "声音异常", description: "检测到异常声响", time: "昨天 22:30", priority: "high" },
            { id: 4, title: "夜视模式", description: "自动切换到夜视模式", time: "昨天 19:15", priority: "low" },
            { id: 5, title: "设备离线", description: "摄像头连接中断", time: "昨天 15:20", priority: "high" }
        ];

        let isRecording = false;

        // 初始化录像回放
        function initVideoPlayback() {
            const videoPlaybackContainer = document.getElementById('videoPlayback');
            videoPlaybackContainer.innerHTML = '';
            
            videoPlayback.forEach(video => {
                const videoItem = document.createElement('div');
                videoItem.className = 'playback-item';
                videoItem.innerHTML = `
                    <div class="playback-thumbnail">📹</div>
                    <div class="playback-info">
                        <div class="playback-title">${video.title}</div>
                        <div class="playback-time">${video.time}</div>
                        <div class="playback-duration">${video.duration}</div>
                    </div>
                    <div class="playback-status ${video.status}">
                        ${video.status === 'available' ? '可回放' : '处理中'}
                    </div>
                `;
                videoPlaybackContainer.appendChild(videoItem);
            });
        }

        // 初始化告警记录
        function initAlertLog() {
            const alertLogContainer = document.getElementById('alertLog');
            alertLogContainer.innerHTML = '';
            
            alertLog.forEach(alert => {
                const alertItem = document.createElement('div');
                alertItem.className = `alert-item ${alert.priority}-priority`;
                alertItem.innerHTML = `
                    <div class="alert-icon">🚨</div>
                    <div class="alert-info">
                        <div class="alert-title">${alert.title}</div>
                        <div class="alert-description">${alert.description}</div>
                        <div class="alert-time">${alert.time}</div>
                    </div>
                    <div class="alert-priority ${alert.priority}">
                        ${alert.priority === 'high' ? '高' : alert.priority === 'medium' ? '中' : '低'}
                    </div>
                `;
                alertLogContainer.appendChild(alertItem);
            });
        }

        // 切换录像状态
        function toggleRecording() {
            const recordBtn = document.getElementById('recordBtn');
            isRecording = !isRecording;

            if (isRecording) {
                recordBtn.classList.add('active');
                recordBtn.textContent = '⏹️ 停止录像';
                showNotification('开始录像', 'success');
            } else {
                recordBtn.classList.remove('active');
                recordBtn.textContent = '⏺️ 开始录像';
                showNotification('录像已停止', 'success');
            }
        }

        // 截图功能
        function takeSnapshot() {
            showNotification('截图已保存到相册', 'success');
        }

        // 全屏功能
        function fullscreen() {
            showNotification('全屏功能开发中', 'info');
        }

        // 显示设置模态框
        function showSettingsModal() {
            showNotification('设置界面开发中', 'info');
        }

        // 切换开关
        function toggleSwitch(element) {
            element.classList.toggle('active');
            const settingName = element.closest('.setting-item').querySelector('.setting-title').textContent;
            const status = element.classList.contains('active') ? '开启' : '关闭';
            showNotification(`${settingName}已${status}`, 'success');
        }

        // 录像质量滑块
        document.getElementById('videoQuality').addEventListener('input', function() {
            document.getElementById('qualityValue').textContent = this.value;
            showNotification(`录像质量已调整为${this.value}`, 'info');
        });

        // 保存天数选择
        document.getElementById('storageDays').addEventListener('change', function() {
            showNotification(`录像保存期已设置为${this.value}天`, 'success');
        });

        // 显示通知
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <div style="font-weight: bold;">
                    ${type === 'success' ? '✅ 成功' : 
                      type === 'warning' ? '⚠️ 警告' : 
                      type === 'error' ? '🚨 紧急' : 'ℹ️ 信息'}
                </div>
                <div style="margin-top: 5px; font-size: 0.9rem;">${message}</div>
            `;
            
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // 模拟检测状态变化
        function updateDetectionStatus() {
            const detectionItems = ['motionDetection', 'faceDetection', 'soundDetection', 'nightVision'];
            
            detectionItems.forEach(itemId => {
                const item = document.getElementById(itemId);
                const statusText = item.querySelector('.detection-status');
                
                if (Math.random() < 0.1) { // 10% 概率触发异常
                    item.classList.add('active');
                    statusText.textContent = '检测异常';
                    statusText.className = 'detection-status alert';
                    showNotification('检测到异常情况', 'warning');
                } else {
                    item.classList.remove('active');
                    statusText.textContent = '正常';
                    statusText.className = 'detection-status normal';
                }
            });
        }

        // 模拟告警生成
        function generateRandomAlert() {
            if (Math.random() < 0.05) { // 5% 概率生成新告警
                const newAlert = {
                    id: alertLog.length + 1,
                    title: "运动检测",
                    description: "检测到新的运动物体",
                    time: "刚刚",
                    priority: Math.random() > 0.7 ? 'high' : 'medium'
                };
                
                alertLog.unshift(newAlert);
                initAlertLog();
                showNotification('新的告警事件', 'warning');
            }
        }

        // 模拟摄像头状态更新
        function updateCameraStatus() {
            const cameraIcon = document.getElementById('cameraStatusIcon');
            const cameraStatus = document.getElementById('cameraStatus');
            const cameraDesc = document.getElementById('cameraDesc');
            const cameraTime = document.getElementById('cameraTime');

            if (Math.random() < 0.05) { // 5% 概率出现问题
                cameraIcon.textContent = '⚠️';
                cameraStatus.textContent = '连接异常';
                cameraDesc.textContent = '摄像头连接中断，正在重连...';
                cameraTime.textContent = '最后更新：刚刚';
                showNotification('摄像头连接异常', 'error');
            } else {
                cameraIcon.textContent = '📹';
                cameraStatus.textContent = '运行正常';
                cameraDesc.textContent = '所有摄像头工作正常，监控范围内无异常';
                cameraTime.textContent = '最后更新：刚刚';
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initVideoPlayback();
            initAlertLog();
            
            // 每10秒更新检测状态
            setInterval(updateDetectionStatus, 10000);
            
            // 每30秒检查新告警
            setInterval(generateRandomAlert, 30000);
            
            // 每5秒更新摄像头状态
            setInterval(updateCameraStatus, 5000);
            
            // 欢迎消息
            setTimeout(() => {
                showNotification('智能摄像头系统已启动', 'success');
            }, 1000);
        });
    </script>
</body>
</html>
