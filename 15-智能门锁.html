<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能门锁 - 智能养老服务平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .header-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .header h1 {
            color: #2d3748;
            margin-bottom: 15px;
            font-size: 2.5rem;
        }

        .header p {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .header-subtitle {
            color: #9b59b6;
            font-weight: bold;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .card h2 {
            color: #2d3748;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.8rem;
        }

        .card-icon {
            font-size: 2rem;
        }

        /* 门锁状态总览 */
        .lock-overview {
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
            color: white;
            text-align: center;
            padding: 40px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .lock-status-icon {
            font-size: 6rem;
            margin-bottom: 20px;
            display: block;
        }

        .lock-status {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .lock-desc {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .lock-time {
            margin-top: 15px;
            font-size: 1rem;
            opacity: 0.8;
        }

        /* 快速控制 */
        .quick-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .control-item {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 2px solid #ecf0f1;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .control-item:hover {
            border-color: #9b59b6;
            background: rgba(155, 89, 182, 0.1);
            transform: translateY(-3px);
        }

        .control-item:active {
            transform: scale(0.95);
        }

        .control-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .control-title {
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 8px;
        }

        .control-desc {
            color: #666;
            font-size: 0.9rem;
        }

        /* 门锁控制面板 */
        .lock-control {
            text-align: center;
            padding: 40px;
        }

        .unlock-button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .unlock-button.locked {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        .unlock-button.unlocked {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
        }

        .unlock-button:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(231, 76, 60, 0.6);
        }

        .unlock-button.unlocked:hover {
            box-shadow: 0 15px 40px rgba(39, 174, 96, 0.6);
        }

        .unlock-button:active {
            transform: scale(0.95);
        }

        .unlock-button .icon {
            font-size: 4rem;
            margin-bottom: 10px;
            animation: pulse 1.5s infinite;
        }

        .unlock-status {
            font-size: 1.2rem;
            color: #666;
            margin-top: 15px;
        }

        /* 访问记录 */
        .access-log {
            max-height: 400px;
            overflow-y: auto;
        }

        .log-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid #ecf0f1;
            transition: all 0.3s ease;
        }

        .log-item:hover {
            background: rgba(155, 89, 182, 0.05);
        }

        .log-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }

        .log-info {
            flex: 1;
        }

        .log-action {
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .log-user {
            color: #666;
            margin-bottom: 3px;
        }

        .log-time {
            color: #999;
            font-size: 0.8rem;
        }

        .log-status {
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .log-status.success {
            background: rgba(39, 174, 96, 0.1);
            color: #27ae60;
        }

        .log-status.failed {
            background: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
        }

        /* 用户管理 */
        .user-management {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .user-item {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #ecf0f1;
            transition: all 0.3s ease;
        }

        .user-item:hover {
            border-color: #9b59b6;
            background: rgba(155, 89, 182, 0.05);
        }

        .user-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
            font-size: 1.1rem;
        }

        .user-role {
            color: #666;
            font-size: 0.9rem;
        }

        .user-permissions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .permission-tag {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            background: rgba(155, 89, 182, 0.1);
            color: #9b59b6;
            border: 1px solid rgba(155, 89, 182, 0.2);
        }

        .user-actions {
            display: flex;
            gap: 10px;
        }

        .user-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .user-btn.edit {
            background: #3498db;
            color: white;
        }

        .user-btn.edit:hover {
            background: #2980b9;
        }

        .user-btn.delete {
            background: #e74c3c;
            color: white;
        }

        .user-btn.delete:hover {
            background: #c0392b;
        }

        /* 门锁设置 */
        .settings-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .setting-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            border-bottom: 1px solid #ecf0f1;
            transition: all 0.3s ease;
        }

        .setting-item:hover {
            background: rgba(155, 89, 182, 0.05);
        }

        .setting-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }

        .setting-info {
            flex: 1;
        }

        .setting-title {
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .setting-desc {
            color: #666;
            font-size: 0.9rem;
        }

        .setting-control {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .setting-control.toggle-on {
            background: #27ae60;
            color: white;
        }

        .setting-control.toggle-off {
            background: #95a5a6;
            color: white;
        }

        .setting-control:hover {
            opacity: 0.9;
        }

        /* 安全监控 */
        .security-status {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .security-item {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 2px solid #ecf0f1;
            transition: all 0.3s ease;
        }

        .security-item.alarmed {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.05);
        }

        .security-item.secure {
            border-color: #27ae60;
            background: rgba(39, 174, 96, 0.05);
        }

        .security-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }

        .security-title {
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .security-status-text {
            font-size: 0.9rem;
            font-weight: bold;
        }

        .security-status-text.normal {
            color: #27ae60;
        }

        .security-status-text.alert {
            color: #e74c3c;
        }

        /* 通知 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transform: translateX(400px);
            transition: all 0.3s ease;
            z-index: 1000;
            max-width: 300px;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            border-left: 4px solid #27ae60;
        }

        .notification.warning {
            border-left: 4px solid #f39c12;
        }

        .notification.error {
            border-left: 4px solid #e74c3c;
        }

        .notification.info {
            border-left: 4px solid #3498db;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 8px;
            display: block;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: #9b59b6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(155, 89, 182, 0.1);
        }

        .form-select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
        }

        .modal-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-btn.primary {
            background: #9b59b6;
            color: white;
        }

        .modal-btn.primary:hover {
            background: #8e44ad;
        }

        .modal-btn.secondary {
            background: #ecf0f1;
            color: #666;
        }

        .modal-btn.secondary:hover {
            background: #d5dbdb;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2rem;
            }

            .card {
                padding: 20px;
            }

            .quick-controls {
                grid-template-columns: repeat(2, 1fr);
            }

            .user-management {
                grid-template-columns: 1fr;
            }

            .security-status {
                grid-template-columns: repeat(2, 1fr);
            }

            .unlock-button {
                width: 150px;
                height: 150px;
                font-size: 1.2rem;
            }

            .unlock-button .icon {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题区域 -->
        <div class="header">
            <div class="header-icon">🔒</div>
            <h1>智能门锁系统</h1>
            <p>安全便捷，智能守护</p>
            <div class="header-subtitle">远程控制 • 访问记录 • 用户管理 • 安全监控</div>
        </div>

        <!-- 门锁状态总览 -->
        <div class="lock-overview">
            <div class="lock-status-icon" id="lockStatusIcon">🔒</div>
            <div class="lock-status" id="lockStatus">已上锁</div>
            <div class="lock-desc" id="lockDesc">门锁处于安全锁定状态</div>
            <div class="lock-time" id="lockTime">最后操作：2分钟前</div>
        </div>

        <!-- 快速控制 -->
        <div class="quick-controls">
            <div class="control-item" onclick="toggleLock()">
                <span class="control-icon">🔓</span>
                <div class="control-title">开锁</div>
                <div class="control-desc">远程解锁</div>
            </div>
            <div class="control-item" onclick="showAddUserModal()">
                <span class="control-icon">👤</span>
                <div class="control-title">添加用户</div>
                <div class="control-desc">管理权限</div>
            </div>
            <div class="control-item" onclick="viewAccessLog()">
                <span class="control-icon">📋</span>
                <div class="control-title">访问记录</div>
                <div class="control-desc">查看日志</div>
            </div>
            <div class="control-item" onclick="showSettingsModal()">
                <span class="control-icon">⚙️</span>
                <div class="control-title">门锁设置</div>
                <div class="control-desc">系统配置</div>
            </div>
        </div>

        <!-- 主要内容区域 -->
        <div class="main-grid">
            <!-- 门锁控制 -->
            <div class="card">
                <h2><span class="card-icon">🔐</span>门锁控制</h2>
                <div class="lock-control">
                    <button class="unlock-button locked" id="unlockButton" onclick="toggleLock()">
                        <div class="icon" id="unlockIcon">🔒</div>
                        <div id="unlockText">点击开锁</div>
                    </button>
                    <div class="unlock-status" id="unlockStatus">
                        门锁已上锁 • 安全状态
                    </div>
                </div>
            </div>

            <!-- 访问记录 -->
            <div class="card">
                <h2><span class="card-icon">📋</span>访问记录</h2>
                <div class="access-log" id="accessLog">
                    <!-- 访问记录将动态生成 -->
                </div>
            </div>

            <!-- 用户管理 -->
            <div class="card">
                <h2><span class="card-icon">👥</span>用户管理</h2>
                <div class="user-management" id="userManagement">
                    <!-- 用户信息将动态生成 -->
                </div>
            </div>

            <!-- 门锁设置 -->
            <div class="card">
                <h2><span class="card-icon">⚙️</span>门锁设置</h2>
                <div class="settings-list" id="settingsList">
                    <!-- 门锁设置将动态生成 -->
                </div>
            </div>

            <!-- 安全监控 -->
            <div class="card">
                <h2><span class="card-icon">🛡️</span>安全监控</h2>
                <div class="security-status">
                    <div class="security-item secure" id="doorStatus">
                        <span class="security-icon">🚪</span>
                        <div class="security-title">门状态</div>
                        <div class="security-status-text normal">已关闭</div>
                    </div>
                    <div class="security-item secure" id="batteryStatus">
                        <span class="security-icon">🔋</span>
                        <div class="security-title">电池电量</div>
                        <div class="security-status-text normal">85%</div>
                    </div>
                    <div class="security-item secure" id="networkStatus">
                        <span class="security-icon">📶</span>
                        <div class="security-title">网络状态</div>
                        <div class="security-status-text normal">正常</div>
                    </div>
                    <div class="security-item secure" id="alarmStatus">
                        <span class="security-icon">🔔</span>
                        <div class="security-title">报警状态</div>
                        <div class="security-status-text normal">正常</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加用户模态框 -->
    <div id="addUserModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">添加新用户</div>
            <form id="addUserForm">
                <div class="form-group">
                    <label class="form-label">姓名</label>
                    <input type="text" class="form-input" id="userName" required placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label class="form-label">角色</label>
                    <select class="form-select" id="userRole" required>
                        <option value="">请选择角色</option>
                        <option value="家人">家人</option>
                        <option value="访客">访客</option>
                        <option value="保姆">保姆</option>
                        <option value="物业">物业</option>
                        <option value="维修">维修</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">访问权限</label>
                    <div>
                        <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                            <input type="checkbox" id="permissionPermanent" checked>
                            永久权限
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                            <input type="checkbox" id="permissionTemporary">
                            临时权限
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="permissionTimeLimit">
                            时间限制
                        </label>
                    </div>
                </div>
                <div class="form-group" id="timeLimitGroup" style="display: none;">
                    <label class="form-label">限制时间</label>
                    <input type="datetime-local" class="form-input" id="timeLimit">
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="modal-btn primary">确认添加</button>
                    <button type="button" class="modal-btn secondary" onclick="closeModal('addUserModal')">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 通知 -->
    <div id="notification" class="notification"></div>

    <script>
        // 模拟数据
        const accessLogs = [
            { id: 1, user: "李明", action: "开锁", time: "2分钟前", status: "success" },
            { id: 2, user: "张华", action: "密码开锁", time: "1小时前", status: "success" },
            { id: 3, user: "未知用户", action: "尝试开锁", time: "3小时前", status: "failed" },
            { id: 4, user: "王芳", action: "刷卡开锁", time: "昨天 18:30", status: "success" },
            { id: 5, user: "赵强", action: "开锁", time: "昨天 16:45", status: "success" }
        ];

        const users = [
            { id: 1, name: "李明", role: "家人", avatar: "李", permissions: ["永久权限", "密码", "刷卡"], status: "active" },
            { id: 2, name: "张华", role: "家人", avatar: "张", permissions: ["永久权限", "指纹", "密码"], status: "active" },
            { id: 3, name: "王芳", role: "保姆", avatar: "王", permissions: ["临时权限", "密码"], status: "active" },
            { id: 4, name: "访客", role: "访客", avatar: "访", permissions: ["一次性权限", "密码"], status: "inactive" }
        ];

        const settings = [
            { id: 1, title: "自动上锁", desc: "开门后自动上锁", icon: "🔄", enabled: true },
            { id: 2, title: "报警功能", desc: "异常开锁时报警", icon: "🚨", enabled: true },
            { id: 3, title: "声音提示", desc: "开锁时的提示音", icon: "🔊", enabled: false },
            { id: 4, title: "临时密码", desc: "生成临时访问密码", icon: "🔢", enabled: true },
            { id: 5, title: "远程监控", desc: "实时远程监控门锁状态", icon: "📱", enabled: true }
        ];

        let isUnlocked = false;

        // 初始化访问记录
        function initAccessLog() {
            const accessLog = document.getElementById('accessLog');
            accessLog.innerHTML = '';
            
            accessLogs.forEach(log => {
                const logItem = document.createElement('div');
                logItem.className = 'log-item';
                logItem.innerHTML = `
                    <div class="log-icon">🚪</div>
                    <div class="log-info">
                        <div class="log-action">${log.action}</div>
                        <div class="log-user">${log.user}</div>
                        <div class="log-time">${log.time}</div>
                    </div>
                    <div class="log-status ${log.status}">
                        ${log.status === 'success' ? '成功' : '失败'}
                    </div>
                `;
                accessLog.appendChild(logItem);
            });
        }

        // 初始化用户管理
        function initUserManagement() {
            const userManagement = document.getElementById('userManagement');
            userManagement.innerHTML = '';
            
            users.forEach(user => {
                const userItem = document.createElement('div');
                userItem.className = 'user-item';
                userItem.innerHTML = `
                    <div class="user-header">
                        <div class="user-avatar">${user.avatar}</div>
                        <div class="user-info">
                            <div class="user-name">${user.name}</div>
                            <div class="user-role">${user.role}</div>
                        </div>
                    </div>
                    <div class="user-permissions">
                        ${user.permissions.map(permission => `<span class="permission-tag">${permission}</span>`).join('')}
                    </div>
                    <div class="user-actions">
                        <button class="user-btn edit" onclick="editUser(${user.id})">编辑</button>
                        <button class="user-btn delete" onclick="deleteUser(${user.id})">删除</button>
                    </div>
                `;
                userManagement.appendChild(userItem);
            });
        }

        // 初始化门锁设置
        function initSettings() {
            const settingsList = document.getElementById('settingsList');
            settingsList.innerHTML = '';
            
            settings.forEach(setting => {
                const settingItem = document.createElement('div');
                settingItem.className = 'setting-item';
                settingItem.innerHTML = `
                    <div class="setting-icon">${setting.icon}</div>
                    <div class="setting-info">
                        <div class="setting-title">${setting.title}</div>
                        <div class="setting-desc">${setting.desc}</div>
                    </div>
                    <button class="setting-control ${setting.enabled ? 'toggle-on' : 'toggle-off'}" 
                            onclick="toggleSetting(${setting.id})">
                        ${setting.enabled ? '开启' : '关闭'}
                    </button>
                `;
                settingsList.appendChild(settingItem);
            });
        }

        // 切换门锁状态
        function toggleLock() {
            const button = document.getElementById('unlockButton');
            const icon = document.getElementById('unlockIcon');
            const text = document.getElementById('unlockText');
            const status = document.getElementById('unlockStatus');
            const lockIcon = document.getElementById('lockStatusIcon');
            const lockStatus = document.getElementById('lockStatus');
            const lockDesc = document.getElementById('lockDesc');
            const lockTime = document.getElementById('lockTime');

            isUnlocked = !isUnlocked;

            if (isUnlocked) {
                button.className = 'unlock-button unlocked';
                icon.textContent = '🔓';
                text.textContent = '点击上锁';
                status.textContent = '门锁已解锁 • 可正常出入';
                lockIcon.textContent = '🔓';
                lockStatus.textContent = '已解锁';
                lockDesc.textContent = '门锁处于解锁状态';
                lockTime.textContent = '最后操作：刚刚';
                
                showNotification('门锁已解锁', 'success');
            } else {
                button.className = 'unlock-button locked';
                icon.textContent = '🔒';
                text.textContent = '点击开锁';
                status.textContent = '门锁已上锁 • 安全状态';
                lockIcon.textContent = '🔒';
                lockStatus.textContent = '已上锁';
                lockDesc.textContent = '门锁处于安全锁定状态';
                lockTime.textContent = '最后操作：刚刚';
                
                showNotification('门锁已上锁', 'success');
            }

            // 添加新的访问记录
            addAccessLog(isUnlocked ? '开锁' : '上锁');
        }

        // 添加访问记录
        function addAccessLog(action) {
            const newLog = {
                id: accessLogs.length + 1,
                user: "当前用户",
                action: action,
                time: "刚刚",
                status: "success"
            };
            
            accessLogs.unshift(newLog);
            initAccessLog();
        }

        // 显示添加用户模态框
        function showAddUserModal() {
            document.getElementById('addUserModal').classList.add('show');
        }

        // 编辑用户
        function editUser(userId) {
            const user = users.find(u => u.id === userId);
            if (user) {
                showNotification(`编辑用户：${user.name}`, 'info');
                // 这里可以打开编辑用户模态框
            }
        }

        // 删除用户
        function deleteUser(userId) {
            if (confirm('确定要删除这个用户吗？')) {
                const userIndex = users.findIndex(u => u.id === userId);
                if (userIndex > -1) {
                    const userName = users[userIndex].name;
                    users.splice(userIndex, 1);
                    initUserManagement();
                    showNotification(`用户 ${userName} 已删除`, 'success');
                }
            }
        }

        // 切换设置
        function toggleSetting(settingId) {
            const setting = settings.find(s => s.id === settingId);
            if (setting) {
                setting.enabled = !setting.enabled;
                initSettings();
                showNotification(`${setting.title}已${setting.enabled ? '开启' : '关闭'}`, 'success');
            }
        }

        // 查看访问记录
        function viewAccessLog() {
            showNotification('访问记录已更新', 'info');
            initAccessLog();
        }

        // 显示设置模态框
        function showSettingsModal() {
            showNotification('设置功能开发中', 'info');
        }

        // 关闭模态框
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        // 显示通知
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <div style="font-weight: bold;">
                    ${type === 'success' ? '✅ 成功' : 
                      type === 'warning' ? '⚠️ 警告' : 
                      type === 'error' ? '🚨 紧急' : 'ℹ️ 信息'}
                </div>
                <div style="margin-top: 5px; font-size: 0.9rem;">${message}</div>
            `;
            
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // 处理添加用户表单提交
        document.getElementById('addUserForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const userName = document.getElementById('userName').value;
            const userRole = document.getElementById('userRole').value;
            
            if (userName && userRole) {
                // 添加新用户
                const newUser = {
                    id: users.length + 1,
                    name: userName,
                    role: userRole,
                    avatar: userName.charAt(0),
                    permissions: ["密码"],
                    status: "active"
                };
                
                users.push(newUser);
                initUserManagement();
                
                closeModal('addUserModal');
                showNotification(`用户 ${userName} 添加成功`, 'success');
                
                // 重置表单
                this.reset();
            }
        });

        // 处理权限选择变化
        document.getElementById('permissionTimeLimit').addEventListener('change', function() {
            const timeLimitGroup = document.getElementById('timeLimitGroup');
            timeLimitGroup.style.display = this.checked ? 'block' : 'none';
        });

        // 模拟安全状态更新
        function updateSecurityStatus() {
            const doorStatus = document.getElementById('doorStatus');
            const batteryStatus = document.getElementById('batteryStatus');
            const networkStatus = document.getElementById('networkStatus');
            const alarmStatus = document.getElementById('alarmStatus');

            // 模拟随机安全状态
            if (Math.random() < 0.1) { // 10% 概率触发警报
                doorStatus.className = 'security-item alarmed';
                doorStatus.querySelector('.security-status-text').textContent = '异常';
                doorStatus.querySelector('.security-status-text').className = 'security-status-text alert';
                showNotification('门锁异常：请检查门状态', 'error');
            } else {
                doorStatus.className = 'security-item secure';
                doorStatus.querySelector('.security-status-text').textContent = '已关闭';
                doorStatus.querySelector('.security-status-text').className = 'security-status-text normal';
            }

            // 更新电池电量
            const battery = Math.floor(Math.random() * 20) + 70;
            const batteryItem = batteryStatus;
            batteryItem.querySelector('.security-status-text').textContent = `${battery}%`;
            
            if (battery < 20) {
                batteryItem.className = 'security-item alarmed';
                batteryItem.querySelector('.security-status-text').className = 'security-status-text alert';
                showNotification('门锁电量不足，请及时充电', 'warning');
            } else {
                batteryItem.className = 'security-item secure';
                batteryItem.querySelector('.security-status-text').className = 'security-status-text normal';
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initAccessLog();
            initUserManagement();
            initSettings();
            
            // 每30秒更新安全状态
            setInterval(updateSecurityStatus, 30000);
            
            // 欢迎消息
            setTimeout(() => {
                showNotification('智能门锁系统已启动', 'success');
            }, 1000);
        });
    </script>
</body>
</html>
