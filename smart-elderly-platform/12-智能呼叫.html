<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能呼叫 - 智能养老服务平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .header-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .header h1 {
            color: #2d3748;
            margin-bottom: 15px;
            font-size: 2.5rem;
        }

        .header p {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .header-subtitle {
            color: #e74c3c;
            font-weight: bold;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .card h2 {
            color: #2d3748;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.8rem;
        }

        .card-icon {
            font-size: 2rem;
        }

        /* 紧急呼叫按钮 */
        .emergency-call {
            text-align: center;
            padding: 40px;
        }

        .emergency-button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .emergency-button:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(231, 76, 60, 0.6);
        }

        .emergency-button:active {
            transform: scale(0.95);
        }

        .emergency-button .icon {
            font-size: 4rem;
            margin-bottom: 10px;
            animation: pulse 1.5s infinite;
        }

        .emergency-button .text {
            font-size: 1.5rem;
        }

        .call-status {
            font-size: 1.2rem;
            color: #666;
            margin-top: 15px;
        }

        /* 联系人列表 */
        .contact-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid #ecf0f1;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .contact-item:hover {
            background: rgba(231, 76, 60, 0.05);
        }

        .contact-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .contact-info {
            flex: 1;
        }

        .contact-name {
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .contact-phone {
            color: #666;
            font-size: 0.9rem;
        }

        .call-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #27ae60;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .call-btn:hover {
            background: #2ecc71;
            transform: scale(1.1);
        }

        /* 呼叫记录 */
        .call-history {
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid #ecf0f1;
            transition: all 0.3s ease;
        }

        .history-item:hover {
            background: rgba(231, 76, 60, 0.05);
        }

        .history-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .history-icon.incoming {
            background: #27ae60;
            color: white;
        }

        .history-icon.outgoing {
            background: #3498db;
            color: white;
        }

        .history-icon.missed {
            background: #e74c3c;
            color: white;
        }

        .history-info {
            flex: 1;
        }

        .history-contact {
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .history-time {
            color: #666;
            font-size: 0.9rem;
        }

        /* 位置信息 */
        .location-info {
            text-align: center;
            padding: 20px;
            background: rgba(231, 76, 60, 0.1);
            border-radius: 15px;
            border: 2px solid #e74c3c;
        }

        .location-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #27ae60;
            animation: pulse 1.5s infinite;
        }

        .location-text {
            font-weight: bold;
            color: #2d3748;
            font-size: 1.1rem;
        }

        /* 快速设置 */
        .quick-settings {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .setting-item {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 2px solid #ecf0f1;
            transition: all 0.3s ease;
        }

        .setting-item:hover {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.05);
        }

        .setting-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
        }

        .setting-title {
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .setting-desc {
            font-size: 0.9rem;
            color: #666;
        }

        /* 状态指示器 */
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .status-online {
            background: #27ae60;
            animation: pulse 1.5s infinite;
        }

        .status-busy {
            background: #f39c12;
            animation: pulse 1.5s infinite;
        }

        .status-offline {
            background: #95a5a6;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 20px;
        }

        .modal-message {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .modal-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-btn.primary {
            background: #e74c3c;
            color: white;
        }

        .modal-btn.primary:hover {
            background: #c0392b;
        }

        .modal-btn.secondary {
            background: #ecf0f1;
            color: #666;
        }

        .modal-btn.secondary:hover {
            background: #d5dbdb;
        }

        /* 通知 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transform: translateX(400px);
            transition: all 0.3s ease;
            z-index: 1000;
            max-width: 300px;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            border-left: 4px solid #27ae60;
        }

        .notification.warning {
            border-left: 4px solid #f39c12;
        }

        .notification.error {
            border-left: 4px solid #e74c3c;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2rem;
            }

            .card {
                padding: 20px;
            }

            .emergency-button {
                width: 150px;
                height: 150px;
                font-size: 1.5rem;
            }

            .emergency-button .icon {
                font-size: 3rem;
            }

            .quick-settings {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题区域 -->
        <div class="header">
            <div class="header-icon">📞</div>
            <h1>智能呼叫系统</h1>
            <p>一键呼叫，及时响应，安全无忧</p>
            <div class="header-subtitle">紧急呼叫 • 联系人管理 • 呼叫记录 • 位置服务</div>
        </div>

        <!-- 主要内容区域 -->
        <div class="main-grid">
            <!-- 紧急呼叫 -->
            <div class="card">
                <h2><span class="card-icon">🚨</span>紧急呼叫</h2>
                <div class="emergency-call">
                    <button class="emergency-button" onclick="makeEmergencyCall()">
                        <div class="icon">🆘</div>
                        <div class="text">紧急呼叫</div>
                    </button>
                    <div class="call-status" id="callStatus">
                        点击按钮立即求助
                    </div>
                </div>
            </div>

            <!-- 位置信息 -->
            <div class="card">
                <h2><span class="card-icon">📍</span>位置信息</h2>
                <div class="location-info">
                    <div class="location-status">
                        <div class="status-dot"></div>
                        <div class="location-text" id="locationText">正在获取位置...</div>
                    </div>
                    <div style="margin-top: 10px; font-size: 0.9rem; color: #666;">
                        位置信息将自动提供给救援人员
                    </div>
                </div>
            </div>

            <!-- 快速设置 -->
            <div class="card">
                <h2><span class="card-icon">⚙️</span>快速设置</h2>
                <div class="quick-settings">
                    <div class="setting-item" onclick="toggleLocationSharing()">
                        <span class="setting-icon">📍</span>
                        <div class="setting-title">位置共享</div>
                        <div class="setting-desc">已开启</div>
                    </div>
                    <div class="setting-item" onclick="toggleAutoCall()">
                        <span class="setting-icon">🤖</span>
                        <div class="setting-title">自动呼叫</div>
                        <div class="setting-desc">摔倒检测</div>
                    </div>
                    <div class="setting-item" onclick="toggleSoundAlert()">
                        <span class="setting-icon">🔊</span>
                        <div class="setting-title">声音提醒</div>
                        <div class="setting-desc">已开启</div>
                    </div>
                    <div class="setting-item" onclick="viewContactList()">
                        <span class="setting-icon">👥</span>
                        <div class="setting-title">联系人</div>
                        <div class="setting-desc">查看全部</div>
                    </div>
                </div>
            </div>

            <!-- 联系人列表 -->
            <div class="card">
                <h2><span class="card-icon">👥</span>紧急联系人</h2>
                <div class="contact-list" id="contactList">
                    <!-- 联系人将动态生成 -->
                </div>
            </div>

            <!-- 呼叫记录 -->
            <div class="card">
                <h2><span class="card-icon">📞</span>呼叫记录</h2>
                <div class="call-history" id="callHistory">
                    <!-- 呼叫记录将动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 模态框 -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">确认呼叫</div>
            <div class="modal-message" id="modalMessage">您确定要发起紧急呼叫吗？</div>
            <div class="modal-buttons">
                <button class="modal-btn primary" id="modalConfirm">确认</button>
                <button class="modal-btn secondary" onclick="closeModal()">取消</button>
            </div>
        </div>
    </div>

    <!-- 通知 -->
    <div id="notification" class="notification"></div>

    <script>
        let isLocationSharingEnabled = true;
        let isAutoCallEnabled = true;
        let isSoundAlertEnabled = true;

        // 模拟数据
        const contacts = [
            { id: 1, name: "子女 - 小王", phone: "13800138001", avatar: "王" },
            { id: 2, name: "子女 - 小李", phone: "13800138002", avatar: "李" },
            { id: 3, name: "医生 - 张医生", phone: "13800138003", avatar: "张" },
            { id: 4, name: "社区 - 李主任", phone: "13800138004", avatar: "李" },
            { id: 5, name: "邻居 - 王阿姨", phone: "13800138005", avatar: "王" }
        ];

        const callHistory = [
            { id: 1, contact: "子女 - 小王", time: "2024-01-15 14:30", type: "outgoing", duration: "5分钟" },
            { id: 2, contact: "子女 - 小李", time: "2024-01-14 09:15", type: "outgoing", duration: "3分钟" },
            { id: 3, contact: "医生 - 张医生", time: "2024-01-13 16:45", type: "incoming", duration: "8分钟" },
            { id: 4, contact: "子女 - 小王", time: "2024-01-12 11:20", type: "missed", duration: "" },
            { id: 5, contact: "社区 - 李主任", time: "2024-01-11 14:00", type: "outgoing", duration: "2分钟" }
        ];

        // 紧急呼叫
        function makeEmergencyCall() {
            const status = document.getElementById('callStatus');
            status.textContent = '正在发起紧急呼叫...';
            status.style.color = '#f39c12';
            
            // 模拟呼叫过程
            setTimeout(() => {
                status.textContent = '呼叫已接通！救援人员正在赶来';
                status.style.color = '#27ae60';
                showNotification('紧急呼叫已发起，救援人员正在赶来！', 'success');
                addCallHistory('紧急呼叫', 'incoming');
                
                // 3秒后重置状态
                setTimeout(() => {
                    status.textContent = '点击按钮立即求助';
                    status.style.color = '#666';
                }, 3000);
            }, 2000);
        }

        // 呼叫联系人
        function callContact(contactId) {
            const contact = contacts.find(c => c.id === contactId);
            if (contact) {
                showNotification(`正在呼叫 ${contact.name}...`, 'warning');
                addCallHistory(contact.name, 'outgoing');
                
                setTimeout(() => {
                    showNotification(`${contact.name} 接听了电话`, 'success');
                }, 3000);
            }
        }

        // 添加呼叫记录
        function addCallHistory(contactName, type) {
            const historyContainer = document.getElementById('callHistory');
            const now = new Date();
            const timeString = now.toLocaleString('zh-CN');
            
            const historyItem = document.createElement('div');
            historyItem.className = 'history-item';
            historyItem.innerHTML = `
                <div class="history-icon ${type}">
                    ${type === 'incoming' ? '📞' : type === 'outgoing' ? '📞' : '❌'}
                </div>
                <div class="history-info">
                    <div class="history-contact">${contactName}</div>
                    <div class="history-time">${timeString}</div>
                </div>
            `;
            
            historyContainer.insertBefore(historyItem, historyContainer.firstChild);
            
            // 限制记录数量
            while (historyContainer.children.length > 10) {
                historyContainer.removeChild(historyContainer.lastChild);
            }
        }

        // 切换位置共享
        function toggleLocationSharing() {
            isLocationSharingEnabled = !isLocationSharingEnabled;
            const settings = document.querySelectorAll('.setting-item')[0];
            const desc = settings.querySelector('.setting-desc');
            desc.textContent = isLocationSharingEnabled ? '已开启' : '已关闭';
            
            showNotification(
                `位置共享已${isLocationSharingEnabled ? '开启' : '关闭'}`,
                'success'
            );
        }

        // 切换自动呼叫
        function toggleAutoCall() {
            isAutoCallEnabled = !isAutoCallEnabled;
            const settings = document.querySelectorAll('.setting-item')[1];
            const desc = settings.querySelector('.setting-desc');
            desc.textContent = isAutoCallEnabled ? '摔倒检测' : '已关闭';
            
            showNotification(
                `自动呼叫功能已${isAutoCallEnabled ? '开启' : '关闭'}`,
                'success'
            );
        }

        // 切换声音提醒
        function toggleSoundAlert() {
            isSoundAlertEnabled = !isSoundAlertEnabled;
            const settings = document.querySelectorAll('.setting-item')[2];
            const desc = settings.querySelector('.setting-desc');
            desc.textContent = isSoundAlertEnabled ? '已开启' : '已关闭';
            
            showNotification(
                `声音提醒已${isSoundAlertEnabled ? '开启' : '关闭'}`,
                'success'
            );
        }

        // 查看联系人列表
        function viewContactList() {
            showNotification('联系人列表已显示', 'info');
            // 这里可以打开详细的联系人管理界面
        }

        // 显示通知
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <div style="font-weight: bold;">
                    ${type === 'success' ? '✅ 成功' : type === 'warning' ? '⚠️ 警告' : 'ℹ️ 信息'}
                </div>
                <div style="margin-top: 5px; font-size: 0.9rem;">${message}</div>
            `;
            
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // 模拟位置获取
        function updateLocation() {
            const locationText = document.getElementById('locationText');
            locationText.textContent = '北京市朝阳区幸福小区1号楼';
        }

        // 初始化联系人列表
        function initContactList() {
            const contactList = document.getElementById('contactList');
            contactList.innerHTML = '';
            
            contacts.forEach(contact => {
                const contactItem = document.createElement('div');
                contactItem.className = 'contact-item';
                contactItem.innerHTML = `
                    <div class="contact-avatar">${contact.avatar}</div>
                    <div class="contact-info">
                        <div class="contact-name">${contact.name}</div>
                        <div class="contact-phone">${contact.phone}</div>
                    </div>
                    <button class="call-btn" onclick="callContact(${contact.id})" title="呼叫">
                        📞
                    </button>
                `;
                contactList.appendChild(contactItem);
            });
        }

        // 初始化呼叫记录
        function initCallHistory() {
            const callHistoryContainer = document.getElementById('callHistory');
            callHistoryContainer.innerHTML = '';
            
            callHistory.forEach(history => {
                const historyItem = document.createElement('div');
                historyItem.className = 'history-item';
                historyItem.innerHTML = `
                    <div class="history-icon ${history.type}">
                        ${history.type === 'incoming' ? '📞' : history.type === 'outgoing' ? '📞' : '❌'}
                    </div>
                    <div class="history-info">
                        <div class="history-contact">${history.contact}</div>
                        <div class="history-time">${history.time}</div>
                    </div>
                `;
                callHistoryContainer.appendChild(historyItem);
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initContactList();
            initCallHistory();
            updateLocation();
            
            // 每30秒更新位置信息
            setInterval(updateLocation, 30000);
            
            // 欢迎消息
            setTimeout(() => {
                showNotification('智能呼叫系统已启动！', 'success');
            }, 1000);
        });
    </script>
</body>
</html>
