<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紧急按钮 - 智能养老服务平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .header-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .header h1 {
            color: #2d3748;
            margin-bottom: 15px;
            font-size: 2.5rem;
        }

        .header p {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .header-subtitle {
            color: #e74c3c;
            font-weight: bold;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .card h2 {
            color: #2d3748;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.8rem;
        }

        .card-icon {
            font-size: 2rem;
        }

        /* 系统状态总览 */
        .system-overview {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            text-align: center;
            padding: 40px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .system-status-icon {
            font-size: 6rem;
            margin-bottom: 20px;
            display: block;
        }

        .system-status {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .system-desc {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .system-time {
            font-size: 1rem;
            opacity: 0.8;
        }

        /* 紧急按钮区域 */
        .emergency-button-area {
            background: rgba(231, 76, 60, 0.1);
            border: 3px solid #e74c3c;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
        }

        .emergency-button {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 auto 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.3);
            animation: emergencyPulse 2s infinite;
        }

        @keyframes emergencyPulse {
            0% { 
                transform: scale(1);
                box-shadow: 0 10px 30px rgba(231, 76, 60, 0.3);
            }
            50% { 
                transform: scale(1.05);
                box-shadow: 0 15px 40px rgba(231, 76, 60, 0.5);
            }
            100% { 
                transform: scale(1);
                box-shadow: 0 10px 30px rgba(231, 76, 60, 0.3);
            }
        }

        .emergency-button:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(231, 76, 60, 0.5);
        }

        .emergency-button:active {
            transform: scale(0.95);
        }

        .emergency-button-text {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .emergency-button-desc {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .emergency-status {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2d3748;
        }

        .emergency-timer {
            font-size: 2rem;
            color: #e74c3c;
            font-weight: bold;
            margin-top: 10px;
        }

        /* 联系人管理 */
        .contact-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid #ecf0f1;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .contact-item:hover {
            background: rgba(231, 76, 60, 0.05);
        }

        .contact-item.emergency {
            border-left: 4px solid #e74c3c;
            background: rgba(231, 76, 60, 0.05);
        }

        .contact-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1abc9c 0%, #16a085 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .contact-info {
            flex: 1;
        }

        .contact-name {
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .contact-phone {
            color: #666;
            margin-bottom: 3px;
            font-size: 0.9rem;
        }

        .contact-relation {
            color: #999;
            font-size: 0.8rem;
        }

        .contact-status {
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .contact-status.primary {
            background: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
        }

        .contact-status.secondary {
            background: rgba(26, 188, 156, 0.1);
            color: #1abc9c;
        }

        .contact-status.available {
            background: rgba(39, 174, 96, 0.1);
            color: #27ae60;
        }

        .contact-status.offline {
            background: rgba(189, 195, 199, 0.1);
            color: #7f8c8d;
        }

        /* 紧急历史 */
        .emergency-history {
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid #ecf0f1;
            transition: all 0.3s ease;
        }

        .history-item:hover {
            background: rgba(231, 76, 60, 0.05);
        }

        .history-item.emergency {
            border-left: 4px solid #e74c3c;
            background: rgba(231, 76, 60, 0.05);
        }

        .history-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }

        .history-info {
            flex: 1;
        }

        .history-title {
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .history-time {
            color: #666;
            margin-bottom: 3px;
            font-size: 0.9rem;
        }

        .history-status {
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .history-status.responded {
            background: rgba(39, 174, 96, 0.1);
            color: #27ae60;
        }

        .history-status.pending {
            background: rgba(243, 156, 18, 0.1);
            color: #f39c12;
        }

        .history-status.canceled {
            background: rgba(189, 195, 199, 0.1);
            color: #7f8c8d;
        }

        /* 设备监控 */
        .device-monitor {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .device-item {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 2px solid #ecf0f1;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .device-item:hover {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.05);
            transform: translateY(-3px);
        }

        .device-item.active {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.05);
        }

        .device-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }

        .device-title {
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .device-status {
            font-size: 0.9rem;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 10px;
            margin-top: 8px;
        }

        .device-status.online {
            background: rgba(39, 174, 96, 0.1);
            color: #27ae60;
        }

        .device-status.offline {
            background: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
        }

        .device-status.maintenance {
            background: rgba(243, 156, 18, 0.1);
            color: #f39c12;
        }

        /* 设置选项 */
        .setting-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .setting-item {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #ecf0f1;
            transition: all 0.3s ease;
        }

        .setting-item:hover {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.05);
        }

        .setting-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .setting-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }

        .setting-info {
            flex: 1;
        }

        .setting-title {
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .setting-desc {
            color: #666;
            font-size: 0.9rem;
        }

        .setting-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 25px;
            background: #bdc3c7;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-switch.active {
            background: #e74c3c;
        }

        .toggle-switch::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2.5px;
            left: 2.5px;
            transition: all 0.3s ease;
        }

        .toggle-switch.active::before {
            transform: translateX(25px);
        }

        /* 通知 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transform: translateX(400px);
            transition: all 0.3s ease;
            z-index: 1000;
            max-width: 300px;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            border-left: 4px solid #27ae60;
        }

        .notification.warning {
            border-left: 4px solid #f39c12;
        }

        .notification.error {
            border-left: 4px solid #e74c3c;
        }

        .notification.info {
            border-left: 4px solid #1abc9c;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2rem;
            }

            .card {
                padding: 20px;
            }

            .device-monitor {
                grid-template-columns: repeat(2, 1fr);
            }

            .setting-options {
                grid-template-columns: 1fr;
            }

            .emergency-button {
                width: 150px;
                height: 150px;
            }

            .emergency-button-text {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题区域 -->
        <div class="header">
            <div class="header-icon">🆘</div>
            <h1>紧急按钮系统</h1>
            <p>一键呼叫，安全保障</p>
            <div class="header-subtitle">快速响应 • 紧急联系 • 实时监控 • 安全守护</div>
        </div>

        <!-- 系统状态总览 -->
        <div class="system-overview">
            <div class="system-status-icon" id="systemStatusIcon">🟢</div>
            <div class="system-status" id="systemStatus">系统正常</div>
            <div class="system-desc" id="systemDesc">所有紧急设备运行正常</div>
            <div class="system-time" id="systemTime">最后检测：刚刚</div>
        </div>

        <!-- 紧急按钮区域 -->
        <div class="card" style="grid-column: 1 / -1;">
            <h2><span class="card-icon">🆘</span>紧急呼叫</h2>
            <div class="emergency-button-area">
                <button class="emergency-button" onclick="triggerEmergency()" id="emergencyButton">
                    <div class="emergency-button-text">🆘</div>
                    <div>紧急呼叫</div>
                </button>
                <div class="emergency-status" id="emergencyStatus">系统待机中</div>
                <div class="emergency-timer" id="emergencyTimer"></div>
            </div>
        </div>

        <!-- 主要内容区域 -->
        <div class="main-grid">
            <!-- 紧急联系人 -->
            <div class="card">
                <h2><span class="card-icon">👥</span>紧急联系人</h2>
                <div class="contact-list" id="contactList">
                    <!-- 联系人将动态生成 -->
                </div>
            </div>

            <!-- 紧急历史 -->
            <div class="card">
                <h2><span class="card-icon">📋</span>紧急历史</h2>
                <div class="emergency-history" id="emergencyHistory">
                    <!-- 紧急历史将动态生成 -->
                </div>
            </div>

            <!-- 设备监控 -->
            <div class="card">
                <h2><span class="card-icon">📡</span>设备监控</h2>
                <div class="device-monitor">
                    <div class="device-item active" id="primaryButton">
                        <span class="device-icon">🆘</span>
                        <div class="device-title">主要按钮</div>
                        <div class="device-status online">在线</div>
                    </div>
                    <div class="device-item active" id="wallButton">
                        <span class="device-icon">🚨</span>
                        <div class="device-title">墙壁按钮</div>
                        <div class="device-status online">在线</div>
                    </div>
                    <div class="device-item active" id="necklace">
                        <span class="device-icon">📿</span>
                        <div class="device-title">项链按钮</div>
                        <div class="device-status online">在线</div>
                    </div>
                    <div class="device-item" id="watchButton">
                        <span class="device-icon">⌚</span>
                        <div class="device-title">手表按钮</div>
                        <div class="device-status offline">离线</div>
                    </div>
                    <div class="device-item active" id="mobileApp">
                        <span class="device-icon">📱</span>
                        <div class="device-title">手机应用</div>
                        <div class="device-status online">在线</div>
                    </div>
                    <div class="device-item active" id="voiceControl">
                        <span class="device-icon">🎤</span>
                        <div class="device-title">语音控制</div>
                        <div class="device-status online">在线</div>
                    </div>
                </div>
            </div>

            <!-- 系统设置 -->
            <div class="card">
                <h2><span class="card-icon">⚙️</span>系统设置</h2>
                <div class="setting-options">
                    <div class="setting-item">
                        <div class="setting-header">
                            <div class="setting-icon">🔔</div>
                            <div class="setting-info">
                                <div class="setting-title">语音播报</div>
                                <div class="setting-desc">紧急情况语音提示</div>
                            </div>
                        </div>
                        <div class="setting-control">
                            <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
                        </div>
                    </div>
                    <div class="setting-item">
                        <div class="setting-header">
                            <div class="setting-icon">💬</div>
                            <div class="setting-info">
                                <div class="setting-title">短信通知</div>
                                <div class="setting-desc">发送紧急短信</div>
                            </div>
                        </div>
                        <div class="setting-control">
                            <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
                        </div>
                    </div>
                    <div class="setting-item">
                        <div class="setting-header">
                            <div class="setting-icon">📞</div>
                            <div class="setting-info">
                                <div class="setting-title">自动拨号</div>
                                <div class="setting-desc">自动拨打急救电话</div>
                            </div>
                        </div>
                        <div class="setting-control">
                            <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
                        </div>
                    </div>
                    <div class="setting-item">
                        <div class="setting-header">
                            <div class="setting-icon">📍</div>
                            <div class="setting-info">
                                <div class="setting-title">位置共享</div>
                                <div class="setting-desc">实时共享位置信息</div>
                            </div>
                        </div>
                        <div class="setting-control">
                            <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
                        </div>
                    </div>
                    <div class="setting-item">
                        <div class="setting-header">
                            <div class="setting-icon">🔍</div>
                            <div class="setting-info">
                                <div class="setting-title">定位追踪</div>
                                <div class="setting-desc">持续位置追踪</div>
                            </div>
                        </div>
                        <div class="setting-control">
                            <div class="toggle-switch" onclick="toggleSwitch(this)"></div>
                        </div>
                    </div>
                    <div class="setting-item">
                        <div class="setting-header">
                            <div class="setting-icon">🎥</div>
                            <div class="setting-info">
                                <div class="setting-title">录制上传</div>
                                <div class="setting-desc">录制现场音频视频</div>
                            </div>
                        </div>
                        <div class="setting-control">
                            <div class="toggle-switch" onclick="toggleSwitch(this)"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 快速设置 -->
            <div class="card">
                <h2><span class="card-icon">⚡</span>快速设置</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <button class="control-btn emergency" onclick="testSystem()" style="grid-column: 1 / -1;">
                        🧪 测试系统
                    </button>
                    <button class="control-btn" onclick="clearHistory()" style="background: #3498db; color: white;">
                        📋 清空历史
                    </button>
                    <button class="control-btn" onclick="exportData()" style="background: #1abc9c; color: white;">
                        📤 导出数据
                    </button>
                </div>
                
                <div style="margin-top: 20px;">
                    <div class="form-group">
                        <label class="form-label">紧急响应延迟（秒）</label>
                        <div class="slider">
                            <input type="range" min="5" max="60" value="30" id="responseDelay">
                        </div>
                        <div style="text-align: center; color: #666; font-size: 0.9rem;">
                            当前: <span id="delayValue">30</span>秒
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 通知 -->
    <div id="notification" class="notification"></div>

    <style>
        .control-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .control-btn.emergency {
            background: #e74c3c;
            color: white;
        }

        .control-btn.emergency:hover {
            background: #c0392b;
        }
    </style>

    <script>
        // 模拟数据
        const contacts = [
            { name: '张明', phone: '138****1234', relation: '儿子', status: 'primary', available: true },
            { name: '李华', phone: '139****5678', relation: '女儿', status: 'primary', available: true },
            { name: '王医生', phone: '120****9999', relation: '家庭医生', status: 'secondary', available: false },
            { name: '邻居老张', phone: '137****4321', relation: '邻居', status: 'secondary', available: true }
        ];

        const emergencyHistory = [
            { id: 1, time: '2024-01-15 14:30', description: '意外摔倒', status: 'responded', responseTime: '3分钟' },
            { id: 2, time: '2024-01-10 09:15', description: '胸闷气短', status: 'responded', responseTime: '2分钟' },
            { id: 3, time: '2024-01-05 20:45', description: '测试呼叫', status: 'canceled', responseTime: '0分钟' },
            { id: 4, time: '2024-01-01 16:20', description: '头晕目眩', status: 'responded', responseTime: '5分钟' }
        ];

        let isEmergencyActive = false;
        let emergencyTimer = null;
        let timerCount = 0;

        // 初始化联系人列表
        function initContactList() {
            const contactListContainer = document.getElementById('contactList');
            contactListContainer.innerHTML = '';
            
            contacts.forEach(contact => {
                const contactItem = document.createElement('div');
                contactItem.className = `contact-item ${contact.status === 'primary' ? 'emergency' : ''}`;
                contactItem.innerHTML = `
                    <div class="contact-avatar">${contact.name[0]}</div>
                    <div class="contact-info">
                        <div class="contact-name">${contact.name}</div>
                        <div class="contact-phone">${contact.phone}</div>
                        <div class="contact-relation">${contact.relation}</div>
                    </div>
                    <div class="contact-status ${contact.status}">
                        ${contact.status === 'primary' ? '紧急' : '备用'}
                    </div>
                    <div class="contact-status ${contact.available ? 'available' : 'offline'}">
                        ${contact.available ? '在线' : '离线'}
                    </div>
                `;
                contactListContainer.appendChild(contactItem);
            });
        }

        // 初始化紧急历史
        function initEmergencyHistory() {
            const emergencyHistoryContainer = document.getElementById('emergencyHistory');
            emergencyHistoryContainer.innerHTML = '';
            
            emergencyHistory.forEach(history => {
                const historyItem = document.createElement('div');
                historyItem.className = `history-item ${history.status === 'responded' ? 'emergency' : ''}`;
                historyItem.innerHTML = `
                    <div class="history-icon">🆘</div>
                    <div class="history-info">
                        <div class="history-title">${history.description}</div>
                        <div class="history-time">${history.time}</div>
                        <div class="history-time">响应时间：${history.responseTime}</div>
                    </div>
                    <div class="history-status ${history.status}">
                        ${history.status === 'responded' ? '已响应' : 
                          history.status === 'pending' ? '待处理' : '已取消'}
                    </div>
                `;
                emergencyHistoryContainer.appendChild(historyItem);
            });
        }

        // 触发紧急呼叫
        function triggerEmergency() {
            if (isEmergencyActive) {
                cancelEmergency();
                return;
            }
            
            isEmergencyActive = true;
            const emergencyButton = document.getElementById('emergencyButton');
            const emergencyStatus = document.getElementById('emergencyStatus');
            const emergencyTimer = document.getElementById('emergencyTimer');
            
            // 改变按钮状态
            emergencyButton.style.background = 'linear-gradient(135deg, #c0392b 0%, #a93226 100%)';
            emergencyStatus.textContent = '紧急呼叫已激活！';
            emergencyStatus.style.color = '#e74c3c';
            
            // 开始倒计时
            timerCount = 30;
            emergencyTimer.textContent = `${timerCount}秒后自动拨号`;
            
            const timer = setInterval(() => {
                timerCount--;
                emergencyTimer.textContent = `${timerCount}秒后自动拨号`;
                
                if (timerCount <= 0) {
                    clearInterval(timer);
                    emergencyTimer.textContent = '正在拨号...';
                    autoDialEmergency();
                }
            }, 1000);
            
            showNotification('🚨 紧急呼叫已激活，正在联系紧急联系人', 'error');
            
            // 模拟自动拨号
            setTimeout(() => {
                autoDialEmergency();
                clearInterval(timer);
            }, 30000);
        }

        // 取消紧急呼叫
        function cancelEmergency() {
            isEmergencyActive = false;
            const emergencyButton = document.getElementById('emergencyButton');
            const emergencyStatus = document.getElementById('emergencyStatus');
            const emergencyTimer = document.getElementById('emergencyTimer');
            
            emergencyButton.style.background = 'linear-gradient(135deg, #e74c3c 0%, #c0392b 100%)';
            emergencyStatus.textContent = '系统待机中';
            emergencyStatus.style.color = '#2d3748';
            emergencyTimer.textContent = '';
            
            if (emergencyTimer) {
                clearInterval(emergencyTimer);
            }
            
            showNotification('紧急呼叫已取消', 'success');
        }

        // 自动拨号
        function autoDialEmergency() {
            const primaryContact = contacts.find(c => c.status === 'primary' && c.available);
            if (primaryContact) {
                showNotification(`正在拨打 ${primaryContact.name} (${primaryContact.phone})`, 'warning');
                
                // 模拟拨号过程
                setTimeout(() => {
                    showNotification(`${primaryContact.name} 已接通，正在等待救助`, 'success');
                    
                    // 添加到历史记录
                    const newHistory = {
                        id: emergencyHistory.length + 1,
                        time: '刚刚',
                        description: '紧急呼叫（自动）',
                        status: 'responded',
                        responseTime: '即时'
                    };
                    emergencyHistory.unshift(newHistory);
                    initEmergencyHistory();
                    
                    // 重置按钮
                    setTimeout(() => {
                        cancelEmergency();
                    }, 5000);
                }, 3000);
            }
        }

        // 切换开关
        function toggleSwitch(element) {
            element.classList.toggle('active');
            const settingName = element.closest('.setting-item').querySelector('.setting-title').textContent;
            const status = element.classList.contains('active') ? '开启' : '关闭';
            showNotification(`${settingName}已${status}`, 'success');
        }

        // 测试系统
        function testSystem() {
            showNotification('🧪 系统测试中...', 'info');
            setTimeout(() => {
                showNotification('✅ 所有设备测试正常', 'success');
            }, 2000);
        }

        // 清空历史
        function clearHistory() {
            if (confirm('确定要清空所有紧急历史记录吗？')) {
                emergencyHistory.length = 0;
                initEmergencyHistory();
                showNotification('历史记录已清空', 'success');
            }
        }

        // 导出数据
        function exportData() {
            showNotification('📤 正在导出紧急数据...', 'info');
            setTimeout(() => {
                showNotification('✅ 数据导出完成', 'success');
            }, 2000);
        }

        // 显示通知
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <div style="font-weight: bold;">
                    ${type === 'success' ? '✅ 成功' : 
                      type === 'warning' ? '⚠️ 警告' : 
                      type === 'error' ? '🚨 紧急' : 'ℹ️ 信息'}
                </div>
                <div style="margin-top: 5px; font-size: 0.9rem;">${message}</div>
            `;
            
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // 模拟设备状态更新
        function updateDeviceStatus() {
            const devices = [
                { id: 'primaryButton', name: '主要按钮' },
                { id: 'wallButton', name: '墙壁按钮' },
                { id: 'necklace', name: '项链按钮' },
                { id: 'watchButton', name: '手表按钮' },
                { id: 'mobileApp', name: '手机应用' },
                { id: 'voiceControl', name: '语音控制' }
            ];
            
            devices.forEach(device => {
                const deviceElement = document.getElementById(device.id);
                const statusElement = deviceElement.querySelector('.device-status');
                
                if (Math.random() < 0.1) { // 10% 概率状态变化
                    if (statusElement.classList.contains('online')) {
                        statusElement.className = 'device-status offline';
                        statusElement.textContent = '离线';
                        showNotification(`⚠️ ${device.name}连接中断`, 'warning');
                    } else if (statusElement.classList.contains('offline')) {
                        statusElement.className = 'device-status online';
                        statusElement.textContent = '在线';
                        showNotification(`✅ ${device.name}已恢复连接`, 'success');
                    }
                }
            });
        }

        // 模拟系统状态更新
        function updateSystemStatus() {
            const systemIcon = document.getElementById('systemStatusIcon');
            const systemStatus = document.getElementById('systemStatus');
            const systemDesc = document.getElementById('systemDesc');
            const systemTime = document.getElementById('systemTime');

            if (Math.random() < 0.05) { // 5% 概率出现问题
                systemIcon.textContent = '🟡';
                systemStatus.textContent = '设备异常';
                systemDesc.textContent = '部分设备连接异常';
                systemTime.textContent = '最后检测：刚刚';
                showNotification('⚠️ 紧急设备状态异常', 'error');
            } else {
                systemIcon.textContent = '🟢';
                systemStatus.textContent = '系统正常';
                systemDesc.textContent = '所有紧急设备运行正常';
                systemTime.textContent = '最后检测：刚刚';
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initContactList();
            initEmergencyHistory();
            
            // 每30秒更新设备状态
            setInterval(updateDeviceStatus, 30000);
            
            // 每60秒更新系统状态
            setInterval(updateSystemStatus, 60000);
            
            // 响应延迟滑块
            document.getElementById('responseDelay').addEventListener('input', function() {
                document.getElementById('delayValue').textContent = this.value;
                showNotification(`紧急响应延迟已设置为${this.value}秒`, 'info');
            });
            
            // 欢迎消息
            setTimeout(() => {
                showNotification('紧急按钮系统已启动', 'success');
            }, 1000);
        });
    </script>
</body>
</html>
